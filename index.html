<!DOCTYPE html>
<!---Coding By CoderGirl!--->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title> Profle Card UI Design</title>
  <!---Custom Css File!--->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="main">
  <div class="profile-card">
    <div class="image">
      <img src="https://raw.githubusercontent.com/VanDung-dev/Profile-web/refs/heads/main/images/avatar.webp" alt="" class="profile-pic">
    </div>
    <div class="data">
      <h2>Nguyễn Lê Văn Dũng</h2>
      <span>Software Engineer</span>
    </div>
    <div class="row">
      <div class="info">
        <h3>Following</h3>
        <span>12</span>
      </div>
      <div class="info">
        <h3>Followers</h3>
        <span>500</span>
      </div>
      <div class="info">
        <h3>Posts</h3>
        <span>29</span>
      </div>
    </div>
    <div class="buttons">
      <a href="#" class="btn">Message</a>
      <a href="#" class="btn">Follow Me</a>
    </div>
  </div>
</section>
</body>
</html>
